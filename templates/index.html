{{template "base.html" .}}
{{define "title"}}ソース入力 - Quiz Generator{{end}}
{{define "content"}}
<h1 class="text-xl font-bold mb-6 text-slate-100">クイズを生成する</h1>

<form method="POST" action="/generate" enctype="multipart/form-data" class="space-y-5">

  {{/* タブ切り替え */}}
  <div>
    <div class="flex gap-2 mb-3">
      <button type="button" onclick="showTab('text')" id="tab-text"
        class="px-4 py-2 rounded-lg text-sm font-medium transition"
        style="background:#4f46e5;color:#fff">テキスト貼付</button>
      <button type="button" onclick="showTab('file')" id="tab-file"
        class="px-4 py-2 rounded-lg text-sm font-medium transition"
        style="background:#1e2433;color:#94a3b8;border:1px solid #2e3a50">ファイル</button>
      <button type="button" onclick="showTab('path')" id="tab-path"
        class="px-4 py-2 rounded-lg text-sm font-medium transition"
        style="background:#1e2433;color:#94a3b8;border:1px solid #2e3a50">ローカルパス</button>
    </div>

    <div id="pane-text">
      <textarea name="source_text" rows="10"
        class="w-full p-3 text-sm"
        style="background:#1e2433;border:1px solid #2e3a50;border-radius:0.5rem;color:#e2e8f0;resize:vertical"
        placeholder="学習したいテキストやMarkdownをここに貼り付けてください..."></textarea>
    </div>
    <div id="pane-file" class="hidden">
      <input type="file" name="source_file" accept=".md,.txt,.pdf,.pptx"
        class="w-full p-3 text-sm text-slate-400"
        style="background:#1e2433;border:1px solid #2e3a50;border-radius:0.5rem">
    </div>
    <div id="pane-path" class="hidden">
      <input type="text" name="source_path"
        class="w-full p-3 text-sm"
        style="background:#1e2433;border:1px solid #2e3a50;border-radius:0.5rem;color:#e2e8f0"
        placeholder="/Users/yourname/Documents/note.md">
    </div>
  </div>

  {{/* 設定 */}}
  <div class="grid grid-cols-3 gap-4">
    <div>
      <label class="block text-xs text-slate-400 mb-1.5 font-medium">問題数</label>
      <input type="number" name="count" value="10" min="1" max="30"
        class="w-full p-2 text-sm"
        style="background:#1e2433;border:1px solid #2e3a50;border-radius:0.5rem;color:#e2e8f0">
    </div>
    <div>
      <label class="block text-xs text-slate-400 mb-1.5 font-medium">クイズ形式</label>
      <select name="format" class="w-full p-2 text-sm"
        style="background:#1e2433;border:1px solid #2e3a50;border-radius:0.5rem;color:#e2e8f0">
        <option value="mix">ミックス</option>
        <option value="multiple">4択のみ</option>
        <option value="fillblank">穴埋めのみ</option>
      </select>
    </div>
    <div>
      <label class="block text-xs text-slate-400 mb-1.5 font-medium">制限時間（秒/問）</label>
      <select name="time_limit" class="w-full p-2 text-sm"
        style="background:#1e2433;border:1px solid #2e3a50;border-radius:0.5rem;color:#e2e8f0">
        <option value="0">なし</option>
        <option value="15">15秒</option>
        <option value="30">30秒</option>
        <option value="60">60秒</option>
        <option value="90">90秒</option>
      </select>
    </div>
  </div>

  <button type="submit"
    style="background:#4f46e5;border-radius:0.75rem"
    class="w-full text-white font-bold py-3 transition hover:opacity-90 active:scale-98 text-base">
    🚀 クイズを生成する
  </button>
</form>

<script>
function showTab(name) {
  ['text','file','path'].forEach(t => {
    document.getElementById('pane-'+t).classList.toggle('hidden', t !== name);
    const btn = document.getElementById('tab-'+t);
    if (t === name) {
      btn.style.background = '#4f46e5';
      btn.style.color = '#fff';
      btn.style.border = 'none';
    } else {
      btn.style.background = '#1e2433';
      btn.style.color = '#94a3b8';
      btn.style.border = '1px solid #2e3a50';
    }
  });
}
</script>
{{end}}
