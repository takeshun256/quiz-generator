{{template "base.html" .}}
{{define "title"}}生成中... - Quiz Generator{{end}}
{{define "content"}}
<div class="text-center py-16"
  hx-get="/generating/{{.JobID}}/status"
  hx-trigger="every 2s"
  hx-target="this"
  hx-swap="outerHTML">
  <div class="text-5xl mb-6 animate-spin inline-block">⚙️</div>
  <h2 class="text-xl font-bold text-indigo-400">クイズを生成中...</h2>
  <p class="text-gray-400 mt-2 text-sm">OpenAI APIが問題を作成しています。しばらくお待ちください。</p>
</div>
{{end}}
