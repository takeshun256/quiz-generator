<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{block "title" .}}Quiz Generator{{end}}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@2.0.3"></script>
  <link rel="stylesheet" href="/static/app.css">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            surface: '#1e2433',
            card:    '#252d3d',
            border:  '#2e3a50',
          }
        }
      }
    }
  </script>
</head>
<body class="min-h-screen text-slate-200" style="background:#161c2a">
  <nav style="background:#1a2030;border-bottom:1px solid #2a3348" class="px-6 py-3 flex items-center gap-6">
    <a href="/" class="text-base font-bold text-indigo-300 tracking-wide">🎯 Quiz Generator</a>
    <a href="/library" class="text-slate-400 hover:text-slate-200 text-sm transition">問題集</a>
  </nav>
  <main class="max-w-2xl mx-auto px-4 py-10">
    {{block "content" .}}{{end}}
  </main>
</body>
</html>
